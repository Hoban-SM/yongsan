<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>내 예약 조회</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans KR',sans-serif;background:#f0f3f8;color:#1a1a2e;min-height:100vh}

.top-bar{background:#e85c1a;padding:14px 20px;display:flex;align-items:center;justify-content:space-between}
.top-bar .logo{color:#fff;font-size:15px;font-weight:700}
.top-bar .nav-link{color:rgba(255,255,255,0.8);font-size:12px;text-decoration:none;border:1px solid rgba(255,255,255,0.3);padding:5px 12px;border-radius:20px}

.hero{background:linear-gradient(135deg,#e85c1a 0%,#e85c1a 100%);padding:24px 20px 20px;text-align:center;color:#fff}
.hero h1{font-size:20px;font-weight:700;margin-bottom:5px}
.hero p{font-size:13px;opacity:0.85}

.container{max-width:480px;margin:0 auto;padding:16px 14px 60px}

.card{background:#fff;border-radius:12px;padding:20px;margin-bottom:14px;border:1px solid #e8eaf0;box-shadow:0 1px 4px rgba(0,0,0,0.06)}
.card-title{font-size:13px;font-weight:700;color:#e85c1a;margin-bottom:16px;padding-bottom:10px;border-bottom:2px solid #fff3ee;display:flex;align-items:center;gap:6px}
.card-title::before{content:'';width:4px;height:14px;background:#e85c1a;border-radius:2px;display:inline-block}

input[type=tel],input[type=password]{width:100%;padding:11px 13px;border:1.5px solid #dde1e9;border-radius:8px;font-size:14px;color:#1a1a2e;background:#fafbff;font-family:inherit;transition:border-color 0.2s,box-shadow 0.2s;margin-bottom:10px}
input:focus{outline:none;border-color:#e85c1a;background:#fff;box-shadow:0 0 0 3px rgba(232,92,26,0.1)}

.btn{width:100%;padding:13px;border:none;border-radius:9px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;transition:all 0.2s}
.btn-primary{background:#e85c1a;color:#fff}
.btn-primary:hover{background:#0d2149;transform:translateY(-1px);box-shadow:0 4px 14px rgba(26,26,26,0.35)}
.btn-primary:disabled{background:#aaa;cursor:not-allowed;transform:none;box-shadow:none}
.btn-danger{background:#fff;color:#c62828;border:1.5px solid #c62828;margin-top:10px}
.btn-danger:hover{background:#ffebee}
.btn-outline{background:#f0f3f8;color:#555;border:1.5px solid #dde1e9;margin-top:8px}

.err-text{font-size:12px;color:#e53935;margin-bottom:10px;display:none}
.err-text.show{display:block}

/* 순번 카드 */
.seq-card{background:linear-gradient(135deg,#e85c1a,#2d6cbe);border-radius:14px;padding:24px 20px;color:#fff;text-align:center;margin-bottom:14px}
.seq-badge{display:inline-block;background:rgba(255,255,255,0.2);border:1px solid rgba(255,255,255,0.3);border-radius:20px;padding:4px 14px;font-size:12px;margin-bottom:14px}
.seq-num{font-size:58px;font-weight:700;line-height:1;letter-spacing:1px;margin-bottom:6px}
.seq-type{font-size:14px;opacity:0.85}
.status-pill{display:inline-block;padding:5px 16px;border-radius:20px;font-size:13px;font-weight:700;margin-top:14px}
.sp-wait{background:#fff8e1;color:#f57f17}
.sp-confirm{background:#fff3ee;color:#e85c1a}
.sp-done{background:#e8f5e9;color:#2e7d32}
.sp-cancel{background:#ffebee;color:#c62828}

/* 진행 바 */
.progress-section{margin:14px 0 6px}
.progress-labels{display:flex;justify-content:space-between;font-size:12px;color:rgba(255,255,255,0.75);margin-bottom:8px}
.progress-bar{height:8px;background:rgba(255,255,255,0.2);border-radius:4px;overflow:hidden}
.progress-fill{height:100%;background:#fff;border-radius:4px;transition:width 1s ease}

/* 정보 테이블 */
.info-table{width:100%}
.info-table tr{border-bottom:1px solid #f0f3f8}
.info-table tr:last-child{border-bottom:none}
.info-table td{padding:10px 4px;font-size:13px}
.info-table td:first-child{color:#888;width:42%}
.info-table td:last-child{font-weight:500;color:#1a1a2e}

/* 과거(취소 포함) 이력 목록 */
.history-item{display:flex;justify-content:space-between;align-items:center;padding:11px 4px;border-bottom:1px solid #f0f3f8}
.history-item:last-child{border-bottom:none}
.history-left{display:flex;flex-direction:column;gap:3px}
.history-seq{font-size:13px;font-weight:700;color:#1a1a2e}
.history-sub{font-size:11px;color:#999}
.history-status{font-size:11px;padding:3px 10px;border-radius:14px;font-weight:700;white-space:nowrap}

/* 모달 */
.modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.55);z-index:200;align-items:center;justify-content:center;padding:20px}
.modal-overlay.show{display:flex}
.modal{background:#fff;border-radius:16px;padding:28px 24px;max-width:340px;width:100%;text-align:center;animation:modalIn 0.25s ease}
@keyframes modalIn{from{transform:scale(0.9);opacity:0}to{transform:scale(1);opacity:1}}
.modal-icon{font-size:44px;margin-bottom:12px}
.modal-title{font-size:18px;font-weight:700;margin-bottom:8px;color:#c62828}
.modal-desc{font-size:13px;color:#555;line-height:1.7;margin-bottom:20px}
.modal-actions{display:flex;gap:10px}
.mbtn{flex:1;padding:11px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;border:none}
.mbtn-cancel{background:#f0f3f8;color:#555;border:1px solid #dde1e9}
.mbtn-confirm{background:#c62828;color:#fff}

.loading-box{text-align:center;padding:30px;color:#888;font-size:14px}
.spinner{display:inline-block;width:18px;height:18px;border:2px solid #ddd;border-top-color:#e85c1a;border-radius:50%;animation:spin 0.7s linear infinite;margin-right:8px;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}

@media(max-width:480px){.seq-num{font-size:48px}}
</style>
</head>
<body>

<div class="top-bar">
  <div class="top-logo">
    <div class="logo-box"><span>HOBAN</span></div>
    <span style="color:#aaa;font-size:13px">입주예약 시스템</span>
  </div>
  <a href="index.html" class="nav-link">← 예약 접수</a>
</div>

<div class="hero">
  <h1>내 예약 조회</h1>
  <p>연락처와 비밀번호로 예약 현황을 확인하세요</p>
</div>

<div class="container">

  <!-- 로그인 섹션 -->
  <div id="loginSection">
    <div class="card">
      <div class="card-title">예약 조회 로그인</div>
      <input type="tel" id="loginPhone" placeholder="연락처 (010-0000-0000)" maxlength="13">
      <input type="password" id="loginPw" placeholder="비밀번호" maxlength="20">
      <div class="err-text" id="loginErr"></div>
      <button class="btn btn-primary" id="loginBtn" onclick="doLogin()">조회하기</button>
    </div>
    <p style="text-align:center;font-size:12px;color:#aaa;margin-top:12px">
      <a href="index.html" style="color:#e85c1a;font-weight:600">← 신규 예약 접수</a>
    </p>
  </div>

  <!-- 로딩 -->
  <div id="loadingSection" class="loading-box" style="display:none">
    <span class="spinner"></span>조회 중입니다...
  </div>

  <!-- 결과 섹션 -->
  <div id="infoSection" style="display:none">

    <!-- 순번 카드 -->
    <div class="seq-card">
      <div class="seq-badge" id="siteBadge">2블럭 · 84A형</div>
      <div class="seq-num" id="seqNum">-</div>
      <div class="seq-type">나의 대기 순번</div>
      <div class="progress-section" id="progressSection">
        <div class="progress-labels">
          <span>내 앞 대기: <strong id="aheadCount">-</strong>명</span>
          <span>전체 대기: <strong id="totalWaiting">-</strong>명</span>
        </div>
        <div class="progress-bar">
          <div class="progress-fill" id="progressFill" style="width:0%"></div>
        </div>
      </div>
      <div><span class="status-pill" id="statusPill">대기 중</span></div>
    </div>

    <!-- 상세 정보 -->
    <div class="card">
      <div class="card-title">예약 상세 정보</div>
      <table class="info-table">
        <tr><td>성명</td><td id="infoName">-</td></tr>
        <tr><td>현장명</td><td id="infoSite">-</td></tr>
        <tr><td>희망 평형</td><td id="infoType">-</td></tr>
        <tr><td>특공 구분</td><td id="infoSpecial">-</td></tr>
        <tr><td>주택 소유</td><td id="infoHouseOwn">-</td></tr>
        <tr><td>입주 희망</td><td id="infoMoveIn">-</td></tr>
        <tr><td>등록일시</td><td id="infoRegDt">-</td></tr>
      </table>
    </div>

    <!-- 과거(취소 포함) 예약 이력 -->
    <div class="card" id="historySection" style="display:none">
      <div class="card-title">과거 예약 이력</div>
      <div id="historyList"></div>
    </div>

    <button class="btn btn-danger" id="cancelBtn" onclick="showCancelModal()">예약 취소 신청</button>
    <button class="btn btn-outline" onclick="doLogout()">로그아웃</button>
    <p style="text-align:center;font-size:11px;color:#bbb;margin-top:10px;line-height:1.7">
      취소 후 순번은 회수되며 재접수 시 후순위 처리됩니다.
    </p>
  </div>

</div>

<!-- 취소 확인 모달 -->
<div class="modal-overlay" id="cancelModal">
  <div class="modal">
    <div class="modal-icon">⚠️</div>
    <div class="modal-title">예약을 취소하시겠습니까?</div>
    <div class="modal-desc">
      취소 후에는 되돌릴 수 없습니다.<br>
      순번이 회수되며 재접수 시 후순위 처리됩니다.
    </div>
    <div class="modal-actions">
      <button class="mbtn mbtn-cancel" onclick="closeCancelModal()">돌아가기</button>
      <button class="mbtn mbtn-confirm" onclick="doCancel()">취소 확인</button>
    </div>
  </div>
</div>

<!-- 결과 모달 -->
<div class="modal-overlay" id="resultModal">
  <div class="modal">
    <div class="modal-icon" id="resultIcon">✅</div>
    <div class="modal-title" id="resultTitle" style="color:#e85c1a"></div>
    <div class="modal-desc" id="resultMsg"></div>
    <div class="modal-actions" style="justify-content:center">
      <button class="mbtn mbtn-cancel" style="flex:none;padding:11px 32px" onclick="closeResultModal()">확인</button>
    </div>
  </div>
</div>

<script>
function formatRegDt(dtStr){
  if(!dtStr) return '-';
  try{
    // Code.gs에서 이미 KST(Asia/Seoul)로 저장 → 변환 없이 앞 19자만 잘라서 표시
    const s = String(dtStr).trim();
    if(/^\d{4}-\d{2}-\d{2}/.test(s)) return s.substring(0,19);
    return s;
  }catch(e){ return String(dtStr); }
}

const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyU-Qigmb2D92nnZAZxxfsbtqyDTzAacRuFBpPS3mh7y6wgKT0YLcjNgUtKaZ6Z94Q0/exec';
let currentPhone='', currentPw='';

const STATUS_MAP_PILL = {'대기':['sp-wait','대기 중'],'확정':['sp-confirm','확정'],'계약완료':['sp-done','계약 완료'],'취소':['sp-cancel','취소됨']};

// 전화번호 자동 하이픈
document.getElementById('loginPhone').addEventListener('input',function(){
  let v=this.value.replace(/\D/g,'');
  if(v.length>=7) v=v.slice(0,3)+'-'+v.slice(3,7)+'-'+v.slice(7,11);
  else if(v.length>=4) v=v.slice(0,3)+'-'+v.slice(3);
  this.value=v;
});
document.getElementById('loginPw').addEventListener('keydown',e=>{ if(e.key==='Enter') doLogin(); });

async function doLogin(){
  const phone=document.getElementById('loginPhone').value.trim();
  const pw=document.getElementById('loginPw').value;
  const errEl=document.getElementById('loginErr');
  if(!phone||!pw){ errEl.textContent='연락처와 비밀번호를 모두 입력해 주세요.'; errEl.classList.add('show'); return; }

  setLoading(true);
  try{
    const res=await fetch(SCRIPT_URL,{method:'POST',body:JSON.stringify({action:'myinfo',phone,password:pw})});
    const data=await res.json();
    if(!data.ok){ errEl.textContent=data.msg; errEl.classList.add('show'); }
    else{ currentPhone=phone; currentPw=pw; renderInfo(data); }
  }catch(e){ errEl.textContent='네트워크 오류가 발생했습니다.'; errEl.classList.add('show'); }
  finally{ setLoading(false); }
}

function renderInfo(d){
  document.getElementById('loginSection').style.display='none';
  document.getElementById('infoSection').style.display='block';

  document.getElementById('seqNum').textContent=d.seqId||'-';
  document.getElementById('siteBadge').textContent=(d.site||'-')+' · '+(d.type||'-')+'형';

  // 상태 배지
  const [cls,label]=STATUS_MAP_PILL[d.status]||['sp-wait',d.status];
  const pill=document.getElementById('statusPill');
  pill.className='status-pill '+cls;
  pill.textContent=label;

  // 진행 바
  if(d.totalWaiting>0){
    const pct=Math.round(((d.totalWaiting-d.aheadCount)/d.totalWaiting)*100);
    setTimeout(()=>document.getElementById('progressFill').style.width=pct+'%',100);
    document.getElementById('aheadCount').textContent=d.aheadCount;
    document.getElementById('totalWaiting').textContent=d.totalWaiting;
  }

  document.getElementById('infoName').textContent=d.name||'-';
  document.getElementById('infoSite').textContent=d.site||'-';
  document.getElementById('infoType').textContent=(d.type||'-')+'형';
  document.getElementById('infoSpecial').textContent=d.special||'-';
  document.getElementById('infoHouseOwn').textContent=d.houseOwn||'-';
  document.getElementById('infoMoveIn').textContent=d.moveIn||'-';
  document.getElementById('infoRegDt').textContent=formatRegDt(d.regDt);

  // 취소 버튼 표시
  document.getElementById('cancelBtn').style.display=(d.status==='계약완료'||d.status==='취소')?'none':'block';

  // 과거(취소 포함) 예약 이력
  renderHistory(d.history);
}

function renderHistory(history){
  const section=document.getElementById('historySection');
  const listEl=document.getElementById('historyList');

  if(!history || history.length===0){
    section.style.display='none';
    listEl.innerHTML='';
    return;
  }

  section.style.display='block';
  listEl.innerHTML = history.map(h=>{
    const [cls,label]=STATUS_MAP_PILL[h.status]||['sp-wait',h.status];
    const specialTxt=(h.special && h.special!=='해당없음') ? ' · '+h.special : '';
    const regTxt=formatRegDt(h.regDt).substring(0,16);
    return `
      <div class="history-item">
        <div class="history-left">
          <span class="history-seq">${h.seqId}</span>
          <span class="history-sub">${h.site} · ${h.type}형${specialTxt} · 등록 ${regTxt}</span>
        </div>
        <span class="status-pill history-status ${cls}">${label}</span>
      </div>`;
  }).join('');
}

function showCancelModal(){ document.getElementById('cancelModal').classList.add('show'); }
function closeCancelModal(){ document.getElementById('cancelModal').classList.remove('show'); }

async function doCancel(){
  closeCancelModal(); setLoading(true);
  try{
    const res=await fetch(SCRIPT_URL,{method:'POST',body:JSON.stringify({action:'cancel',phone:currentPhone,password:currentPw})});
    const data=await res.json();
    showResult(data.ok, data.ok?'취소 완료':'취소 실패', data.msg);
    if(data.ok) setTimeout(doLogout,2000);
  }catch(e){ showResult(false,'오류','처리 중 오류가 발생했습니다.'); }
  finally{ setLoading(false); }
}

function showResult(ok,title,msg){
  document.getElementById('resultIcon').textContent=ok?'✅':'❌';
  document.getElementById('resultTitle').textContent=title;
  document.getElementById('resultTitle').style.color=ok?'#e85c1a':'#c62828';
  document.getElementById('resultMsg').textContent=msg;
  document.getElementById('resultModal').classList.add('show');
}
function closeResultModal(){ document.getElementById('resultModal').classList.remove('show'); }

function doLogout(){
  currentPhone=''; currentPw='';
  document.getElementById('infoSection').style.display='none';
  document.getElementById('historySection').style.display='none';
  document.getElementById('loginSection').style.display='block';
  document.getElementById('loginPhone').value='';
  document.getElementById('loginPw').value='';
  document.getElementById('loginErr').classList.remove('show');
}

function setLoading(on){
  document.getElementById('loadingSection').style.display=on?'block':'none';
  document.getElementById('loginBtn').disabled=on;
}
</script>
</body>
</html>

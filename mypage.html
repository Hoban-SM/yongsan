<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>내 예약 조회</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans KR', sans-serif; background: #f5f5f5; color: #222; }
  .container { max-width: 480px; margin: 0 auto; padding: 20px 16px 60px; }
  .header { text-align: center; padding: 24px 0 20px; }
  .header h1 { font-size: 20px; font-weight: 700; color: #1a3a6b; }

  .card { background: #fff; border-radius: 10px; padding: 18px; margin-bottom: 14px; border: 1px solid #e0e0e0; }
  .card-title { font-size: 13px; font-weight: 700; color: #444; margin-bottom: 14px; }

  input[type="tel"], input[type="password"] {
    width: 100%; padding: 11px 13px; border: 1px solid #ddd; border-radius: 7px;
    font-size: 14px; margin-bottom: 10px; background: #fafafa;
  }
  input:focus { outline: none; border-color: #1a73e8; box-shadow: 0 0 0 3px rgba(26,115,232,0.1); }

  .btn { width: 100%; padding: 13px; border: none; border-radius: 8px; font-size: 15px; font-weight: 700; cursor: pointer; }
  .btn-primary { background: #1a3a6b; color: #fff; }
  .btn-danger { background: #fff; color: #c62828; border: 1px solid #c62828; margin-top: 12px; }
  .btn:disabled { background: #ccc; cursor: not-allowed; }

  .seq-display { text-align: center; padding: 20px 0 10px; }
  .seq-num { font-size: 52px; font-weight: 700; color: #1a3a6b; line-height: 1; }
  .seq-label { font-size: 13px; color: #888; margin-top: 4px; }

  .status-badge { display: inline-block; padding: 5px 14px; border-radius: 20px; font-size: 13px; font-weight: 700; }
  .s-waiting   { background: #fff8e1; color: #f57f17; }
  .s-confirmed { background: #e8f0fe; color: #1a73e8; }
  .s-completed { background: #e8f5e9; color: #2e7d32; }
  .s-canceled  { background: #ffebee; color: #c62828; }

  .info-table { width: 100%; }
  .info-table tr { border-bottom: 1px solid #f5f5f5; }
  .info-table tr:last-child { border-bottom: none; }
  .info-table td { padding: 9px 4px; font-size: 13px; }
  .info-table td:first-child { color: #888; width: 40%; }
  .info-table td:last-child { font-weight: 500; }

  .progress-section { margin: 14px 0; }
  .progress-labels { display: flex; justify-content: space-between; font-size: 12px; color: #888; margin-bottom: 6px; }
  .progress-bar { height: 10px; background: #f0f0f0; border-radius: 5px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, #1a3a6b, #1a73e8); border-radius: 5px; transition: width 0.8s ease; }

  .error-box { background: #ffebee; border: 1px solid #ef9a9a; border-radius: 8px; padding: 12px; text-align: center; color: #c62828; font-size: 13px; }
  .loading-box { text-align: center; padding: 20px; color: #888; font-size: 14px; }

  .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 100; align-items: center; justify-content: center; }
  .modal-overlay.show { display: flex; }
  .modal { background: #fff; border-radius: 12px; padding: 28px 22px; max-width: 320px; width: 90%; text-align: center; }
  .modal-title { font-size: 17px; font-weight: 700; margin-bottom: 10px; color: #c62828; }
  .modal-desc { font-size: 13px; color: #555; line-height: 1.7; margin-bottom: 18px; }
  .modal-actions { display: flex; gap: 10px; }
  .modal-btn-cancel { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 7px; background: #fff; font-size: 14px; cursor: pointer; }
  .modal-btn-confirm { flex: 1; padding: 10px; border: none; border-radius: 7px; background: #c62828; color: #fff; font-size: 14px; font-weight: 700; cursor: pointer; }

  /* 과거(취소 포함) 이력 목록 */
  .history-card { background: #fff; border: 1px solid #e0e0e0; border-radius: 10px; padding: 6px 16px; margin-bottom: 14px; }
  .history-item { display: flex; justify-content: space-between; align-items: center; padding: 11px 0; border-bottom: 1px solid #f5f5f5; }
  .history-item:last-child { border-bottom: none; }
  .history-left { display: flex; flex-direction: column; gap: 3px; }
  .history-seq { font-size: 13px; font-weight: 700; color: #444; }
  .history-sub { font-size: 11px; color: #999; }
  .history-status { font-size: 11px; padding: 3px 10px; border-radius: 14px; font-weight: 700; white-space: nowrap; }
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1>내 예약 조회</h1>
  </div>

  <!-- 로그인 폼 -->
  <div id="loginSection">
    <div class="card">
      <div class="card-title">연락처 + 비밀번호로 조회</div>
      <input type="tel" id="loginPhone" placeholder="010-0000-0000" maxlength="13">
      <input type="password" id="loginPw" placeholder="비밀번호" maxlength="20">
      <div id="loginError" style="font-size:12px; color:#c62828; margin-bottom:10px; display:none;"></div>
      <button class="btn btn-primary" id="loginBtn" onclick="doLogin()">조회하기</button>
    </div>
    <p style="text-align:center; font-size:12px; color:#aaa; margin-top:12px;">
      <a href="?page=reserve" style="color:#1a3a6b;">← 신규 예약 접수</a>
    </p>
  </div>

  <!-- 조회 결과 -->
  <div id="infoSection" style="display:none;">

    <div class="card" style="text-align:center;">
      <div id="statusBadgeWrap" style="margin-bottom:14px;"></div>
      <div class="seq-display">
        <div class="seq-num" id="seqNum">-</div>
        <div class="seq-label" id="seqSub">-</div>
      </div>

      <div class="progress-section" id="progressSection">
        <div class="progress-labels">
          <span>내 앞 대기: <strong id="aheadCount">-</strong>명</span>
          <span>전체 대기: <strong id="totalWaiting">-</strong>명</span>
        </div>
        <div class="progress-bar">
          <div class="progress-fill" id="progressFill" style="width:0%"></div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">예약 상세 정보</div>
      <table class="info-table">
        <tr><td>성명</td><td id="infoName">-</td></tr>
        <tr><td>현장명</td><td id="infoSite">-</td></tr>
        <tr><td>희망 평형</td><td id="infoType">-</td></tr>
        <tr><td>특공 구분</td><td id="infoSpecial">-</td></tr>
        <tr><td>주택 소유</td><td id="infoHouseOwn">-</td></tr>
        <tr><td>입주 희망</td><td id="infoMoveIn">-</td></tr>
        <tr><td>등록일시</td><td id="infoRegDt">-</td></tr>
      </table>
    </div>

    <!-- 과거(취소 포함) 예약 이력 -->
    <div id="historySection" style="display:none;">
      <div class="card-title" style="padding:0 2px;">과거 예약 이력</div>
      <div class="history-card" id="historyList"></div>
    </div>

    <button class="btn btn-danger" id="cancelBtn" onclick="showCancelModal()">예약 취소 신청</button>
    <p style="text-align:center; font-size:11px; color:#bbb; margin-top:8px; line-height:1.7;">
      취소 후 순번은 회수되며, 재접수 시 후순위 처리됩니다.
    </p>
    <p style="text-align:center; margin-top:16px;">
      <a href="#" onclick="logout()" style="font-size:12px; color:#aaa;">로그아웃</a>
    </p>
  </div>

  <div id="loadingSection" class="loading-box" style="display:none;">처리 중입니다...</div>
  <div id="errorSection" style="display:none;"></div>
</div>

<!-- 취소 확인 모달 -->
<div class="modal-overlay" id="cancelModal">
  <div class="modal">
    <div class="modal-title">예약을 취소하시겠습니까?</div>
    <div class="modal-desc">
      취소 후에는 되돌릴 수 없습니다.<br>
      순번이 회수되며 재접수 시 후순위 처리됩니다.
    </div>
    <div class="modal-actions">
      <button class="modal-btn-cancel" onclick="closeCancelModal()">돌아가기</button>
      <button class="modal-btn-confirm" onclick="doCancel()">취소 확인</button>
    </div>
  </div>
</div>

<script>
const SCRIPT_URL = '<?= ScriptApp.getService().getUrl() ?>';
let currentPhone = '', currentPw = '', currentRowIndex = null;

const STATUS_MAP = {
  '대기':     { cls: 's-waiting',   label: '대기 중' },
  '확정':     { cls: 's-confirmed', label: '확정' },
  '계약완료': { cls: 's-completed', label: '계약완료' },
  '취소':     { cls: 's-canceled',  label: '취소됨' }
};

// 전화번호 자동 하이픈
document.getElementById('loginPhone').addEventListener('input', function() {
  let v = this.value.replace(/\D/g, '');
  if (v.length >= 7) v = v.slice(0,3) + '-' + v.slice(3,7) + '-' + v.slice(7,11);
  else if (v.length >= 4) v = v.slice(0,3) + '-' + v.slice(3);
  this.value = v;
});

// Enter 키 로그인
document.getElementById('loginPw').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});

async function doLogin() {
  const phone = document.getElementById('loginPhone').value.trim();
  const pw    = document.getElementById('loginPw').value;
  const errEl = document.getElementById('loginError');

  if (!phone || !pw) { errEl.textContent = '연락처와 비밀번호를 모두 입력해 주세요.'; errEl.style.display = 'block'; return; }

  setLoading(true);
  try {
    const res = await fetch(SCRIPT_URL, {
      method: 'POST',
      body: JSON.stringify({ action: 'myinfo', phone, password: pw })
    });
    const data = await res.json();

    if (!data.ok) {
      errEl.textContent = data.msg;
      errEl.style.display = 'block';
    } else {
      currentPhone = phone;
      currentPw    = pw;
      renderInfo(data);
    }
  } catch(e) {
    errEl.textContent = '네트워크 오류가 발생했습니다.';
    errEl.style.display = 'block';
  } finally {
    setLoading(false);
  }
}

function renderInfo(d) {
  document.getElementById('loginSection').style.display = 'none';
  document.getElementById('infoSection').style.display = 'block';

  currentRowIndex = d.rowIndex || null;

  // 순번 및 타입
  document.getElementById('seqNum').textContent = d.seqId;
  document.getElementById('seqSub').textContent = `${d.type} · ${d.site}`;

  // 상태 배지
  const s = STATUS_MAP[d.status] || { cls: '', label: d.status };
  document.getElementById('statusBadgeWrap').innerHTML =
    `<span class="status-badge ${s.cls}">${s.label}</span>`;

  // 진행률 바 (취소/완료 건은 숨김)
  const progressSection = document.getElementById('progressSection');
  if (d.status === '대기' || d.status === '확정') {
    progressSection.style.display = 'block';
    if (d.totalWaiting > 0) {
      const pct = Math.round(((d.totalWaiting - d.aheadCount) / d.totalWaiting) * 100);
      document.getElementById('progressFill').style.width = pct + '%';
      document.getElementById('aheadCount').textContent   = d.aheadCount;
      document.getElementById('totalWaiting').textContent = d.totalWaiting;
    }
  } else {
    progressSection.style.display = 'none';
  }

  // 상세 정보
  document.getElementById('infoName').textContent    = d.name;
  document.getElementById('infoSite').textContent    = d.site;
  document.getElementById('infoType').textContent    = d.type;
  document.getElementById('infoSpecial').textContent = d.special || '-';
  document.getElementById('infoHouseOwn').textContent= d.houseOwn || '-';
  document.getElementById('infoMoveIn').textContent  = d.moveIn;
  document.getElementById('infoRegDt').textContent   = d.regDt;

  // 취소 버튼: 완료/취소 상태는 숨김
  document.getElementById('cancelBtn').style.display =
    (d.status === '계약완료' || d.status === '취소') ? 'none' : 'block';

  // 과거(취소 포함) 예약 이력
  renderHistory(d.history);
}

function renderHistory(history) {
  const section = document.getElementById('historySection');
  const listEl  = document.getElementById('historyList');

  if (!history || history.length === 0) {
    section.style.display = 'none';
    listEl.innerHTML = '';
    return;
  }

  section.style.display = 'block';
  listEl.innerHTML = history.map(h => {
    const s = STATUS_MAP[h.status] || { cls: '', label: h.status };
    const specialTxt = (h.special && h.special !== '해당없음') ? ' · ' + h.special : '';
    const regTxt = h.regDt ? String(h.regDt).substring(0, 16) : '';
    return `
      <div class="history-item">
        <div class="history-left">
          <span class="history-seq">${h.seqId}</span>
          <span class="history-sub">${h.site} · ${h.type}형${specialTxt} · 등록 ${regTxt}</span>
        </div>
        <span class="status-badge history-status ${s.cls}">${s.label}</span>
      </div>`;
  }).join('');
}

function showCancelModal() { document.getElementById('cancelModal').classList.add('show'); }
function closeCancelModal() { document.getElementById('cancelModal').classList.remove('show'); }

async function doCancel() {
  closeCancelModal();
  setLoading(true);
  try {
    const payload = { action: 'cancel', phone: currentPhone, password: currentPw };
    if (currentRowIndex) payload.rowIndex = currentRowIndex;

    const res = await fetch(SCRIPT_URL, {
      method: 'POST',
      body: JSON.stringify(payload)
    });
    const data = await res.json();
    alert(data.msg);
    if (data.ok) logout();
  } catch(e) {
    alert('처리 중 오류가 발생했습니다.');
  } finally {
    setLoading(false);
  }
}

function logout() {
  currentPhone = '';
  currentPw    = '';
  currentRowIndex = null;
  document.getElementById('infoSection').style.display   = 'none';
  document.getElementById('historySection').style.display = 'none';
  document.getElementById('loginSection').style.display  = 'block';
  document.getElementById('loginPhone').value = '';
  document.getElementById('loginPw').value    = '';
  document.getElementById('loginError').style.display = 'none';
}

function setLoading(on) {
  document.getElementById('loadingSection').style.display = on ? 'block' : 'none';
  document.getElementById('loginBtn').disabled = on;
}
</script>
</body>
</html>
